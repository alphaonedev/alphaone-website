<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlphaOne</title>
<meta name="description" content="AlphaOne LLC — building in stealth.">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  :root { --bg: #07090c; --fg: #e8ebef; --dim: #6b7480; --accent: #4f8cff; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  main { padding: 2rem; }
  .mark {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 64px;
    height: 64px;
    border-radius: 16px;
    background: linear-gradient(135deg, #14202e, #0b1017);
    border: 1px solid #1d2836;
    font-size: 1.4rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--accent);
    margin-bottom: 1.75rem;
  }
  h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; }
  .status {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 1.25rem;
    padding: 0.4rem 0.9rem;
    border: 1px solid #1d2836;
    border-radius: 999px;
    font-size: 0.8rem;
    color: var(--dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
  .contact { margin-top: 2.5rem; font-size: 0.85rem; color: var(--dim); }
  .contact a { color: var(--fg); text-decoration: none; border-bottom: 1px solid #2a3646; }
  .contact a:hover { color: var(--accent); border-color: var(--accent); }
</style>
</head>
<body>
<main>
  <div class="mark">A1</div>
  <h1>AlphaOne</h1>
  <div class="status"><span class="dot"></span>Stealth Mode</div>
  <p class="contact">Inquiries — <a href="mailto:justin@alpha-one.mobi">justin@alpha-one.mobi</a></p>
</main>
</body>
</html>
